# teale-node — Windows ≥16 GB configuration template
#
# Pilot-scope fleet template for the Windows companion flow. The node starts
# without a boot model, exposes the localhost control API on :11437, and the
# Teale companion window downloads/loads the recommended model at runtime.
#
# Copy this file to teale-node.toml and customize, or let deploy-windows.ps1
# (or the Inno Setup installer's post-install.ps1) generate it automatically
# with hostname + thread count + GPU detection baked in.

[relay]
url = "wss://relay.teale.com/ws"

[llama]
# Path to llama-server binary — must be the Vulkan build
# (llama-bXXXX-bin-win-vulkan-x64.zip from llama.cpp releases).
binary = "C:/Teale/bin/llama-server.exe"
# Boot without a model; the companion app downloads and loads one later.
model = ""
# Full offload to Vulkan-capable iGPU. llama-server falls back to CPU
# automatically if Vulkan init fails (e.g., missing drivers); teale-node's
# supervisor loop notices the crash and restarts with gpu_layers=0 on retry.
gpu_layers = 999
context_size = 8192
# Local port for llama-server HTTP API (bound to 127.0.0.1 only).
port = 11436
# Threads = logical cores minus 2 (leave headroom for OS + user apps).
# deploy-windows.ps1 calculates this automatically per machine.
extra_args = ["--threads", "6"]

[control]
port = 11437
registry_path = "C:/Teale/config/model-registry.json"

[node]
display_name = "WIN-HOSTNAME"
# Reported in NodeCapabilities; gateway scheduler uses it to estimate
# decode throughput (EWMA prior starts from bandwidth / active-param-size).
gpu_backend = "vulkan"
# gpu_vram_gb omitted — max_model_size_gb = 0.75 * total_ram_gb ≈ 12 GB.
