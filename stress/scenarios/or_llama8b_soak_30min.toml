name = "or_llama8b_soak_30min"
gateway_url = "https://gateway.teale.com"
token = "$GATEWAY_DEV_TOKEN"
duration_seconds = 1800
rps = 1.0
warmup_seconds = 30
concurrency_cap = 8

# 30-min soak at the capacity we've demonstrated sustainable on 4
# Apple-Silicon Mac nodes serving meta-llama/llama-3.1-8b-instruct
# (Q4_K_M). This is the headline result we cite in the OpenRouter
# application.

[[requests]]
model = "meta-llama/llama-3.1-8b-instruct"
weight = 1
prompt_tokens_mean = 128
prompt_tokens_stddev = 32
max_tokens = 64
streaming = true
