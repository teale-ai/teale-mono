name: Linux Desktop Release

on:
  push:
    tags:
      - 'teale-*'
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build Teale Linux desktop bundle
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build teale-node and teale-tray (release)
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p teale-node
          cargo build --release --target x86_64-unknown-linux-gnu -p teale-tray

      - name: Download llama-server (CPU build)
        run: |
          mkdir -p .build/linux-downloads
          eval "$(
          python3 - <<'PY'
          import json
          import shlex
          import urllib.request

          releases = json.load(
              urllib.request.urlopen("https://api.github.com/repos/ggml-org/llama.cpp/releases")
          )
          for release in releases:
              for asset in release.get("assets", []):
                  name = asset.get("name", "")
                  if name.startswith("llama-") and name.endswith("-bin-ubuntu-x64.tar.gz"):
                      print(f"LLAMA_RELEASE={shlex.quote(release['tag_name'])}")
                      print(f"LLAMA_ARCHIVE={shlex.quote(name)}")
                      print(f"LLAMA_URL={shlex.quote(asset['browser_download_url'])}")
                      raise SystemExit(0)

          raise SystemExit("No suitable llama.cpp Ubuntu x64 archive found in recent releases")
          PY
          )"
          curl --retry 6 --retry-all-errors --retry-delay 5 -fsSL \
            "${LLAMA_URL}" \
            -o .build/linux-downloads/llama.tar.gz
          tar -xzf .build/linux-downloads/llama.tar.gz -C .build/linux-downloads
          LLAMA_SERVER_PATH="$(find .build/linux-downloads -type f -name llama-server -print -quit)"
          test -n "${LLAMA_SERVER_PATH}"
          cp "${LLAMA_SERVER_PATH}" .build/linux-downloads/llama-server
          chmod +x .build/linux-downloads/llama-server

      - name: Assemble Linux desktop bundle
        env:
          TEALE_SUPABASE_URL: ${{ secrets.TEALE_SUPABASE_URL }}
          TEALE_SUPABASE_ANON_KEY: ${{ secrets.TEALE_SUPABASE_ANON_KEY }}
          TEALE_SUPABASE_REDIRECT_URL: ${{ secrets.TEALE_SUPABASE_REDIRECT_URL }}
        run: |
          mkdir -p .build
          node/linux-desktop/build-package.sh \
            target/x86_64-unknown-linux-gnu/release/teale-node \
            target/x86_64-unknown-linux-gnu/release/teale-tray \
            .build/linux-downloads/llama-server \
            .build/Teale-linux-x86_64
          tar -C .build -czf .build/Teale-linux-x86_64.tar.gz Teale-linux-x86_64
          sha256sum .build/Teale-linux-x86_64.tar.gz > .build/Teale-linux-x86_64-checksums.txt

      - name: Upload Linux desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: Teale-linux-${{ github.ref_name }}
          path: |
            .build/Teale-linux-x86_64.tar.gz
            .build/Teale-linux-x86_64-checksums.txt
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" \
              --title "Teale $tag" \
              --notes "Desktop release assets for Teale."
          gh release upload "$tag" \
            .build/Teale-linux-x86_64.tar.gz \
            .build/Teale-linux-x86_64-checksums.txt \
            --clobber
