name: Mac App Release

on:
  push:
    tags: ['mac-v*']
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mac-app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          # Use the same YYYY.MM.DD.HHMM format as internal builds, prefixed mac-v.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="mac-v$(date -u '+%Y.%m.%d.%H%M')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 -d > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Build app bundle (signed)
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: ./bundle.sh

      - name: Notarize and staple .app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent .build/Teale.app .build/Teale-unstapled.zip
          xcrun notarytool submit .build/Teale-unstapled.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple .build/Teale.app
          spctl -a -vvv --type execute .build/Teale.app
          rm .build/Teale-unstapled.zip

      - name: Build, sign, notarize, staple DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          STAGING=.build/dmg-staging
          rm -rf "$STAGING" .build/Teale.dmg
          mkdir -p "$STAGING"
          cp -R .build/Teale.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Teale" -srcfolder "$STAGING" -ov -format UDZO .build/Teale.dmg
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp .build/Teale.dmg
          xcrun notarytool submit .build/Teale.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple .build/Teale.dmg
          spctl -a -vvv --type install .build/Teale.dmg
          rm -rf "$STAGING"

      - name: Build CLI binary
        run: |
          swift build -c release --product teale
          cp .build/release/teale .build/teale-macos-arm64
          strip .build/teale-macos-arm64

      - name: Package artifacts
        run: |
          cd .build
          ditto -c -k --keepParent Teale.app Teale.zip
          shasum -a 256 Teale.dmg > checksums.txt
          shasum -a 256 Teale.zip >> checksums.txt
          shasum -a 256 teale-macos-arm64 >> checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "Teale $TAG" \
            --notes "$(cat <<'EOF'
          ## Install

          **Recommended:** download **Teale.dmg** below, double-click to open, drag Teale to Applications, then launch from Launchpad.

          **Or one command:**
          ```
          curl -fsSL https://raw.githubusercontent.com/teale-ai/teale-mono/main/mac-app/scripts/install.sh | sh
          ```

          Requires macOS 14 Sonoma or later. Apple Silicon only.
          EOF
          )" \
            .build/Teale.dmg \
            .build/Teale.zip \
            .build/teale-macos-arm64 \
            .build/checksums.txt
