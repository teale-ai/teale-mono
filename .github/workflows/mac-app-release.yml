name: Mac App Release

on:
  push:
    tags: ['mac-v*']
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mac-app
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          # Use the same YYYY.MM.DD.HHMM format as internal builds, prefixed mac-v.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="mac-v$(date -u '+%Y.%m.%d.%H%M')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 -d > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Build app bundle (signed)
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: ./bundle.sh

      - name: Verify signed .app
        run: |
          codesign --verify --deep --strict --verbose=2 .build/Teale.app

      - name: Build and sign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: |
          STAGING=.build/dmg-staging
          rm -rf "$STAGING" .build/Teale.dmg
          mkdir -p "$STAGING"
          cp -R .build/Teale.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Teale" -srcfolder "$STAGING" -ov -format UDZO .build/Teale.dmg
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp .build/Teale.dmg
          codesign --verify --verbose=2 .build/Teale.dmg
          rm -rf "$STAGING"

      - name: Build CLI binary
        run: |
          swift build -c release --product teale
          cp .build/release/teale .build/teale-macos-arm64
          strip .build/teale-macos-arm64

      - name: Package artifacts
        run: |
          cd .build
          ditto -c -k --keepParent Teale.app Teale.zip
          shasum -a 256 Teale.dmg > checksums.txt
          shasum -a 256 Teale.zip >> checksums.txt
          shasum -a 256 teale-macos-arm64 >> checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "Teale $TAG" \
            --notes "$(cat <<'EOF'
          ## Install

          **Recommended:** download **Teale.dmg** below, double-click to open, drag Teale to Applications, then launch from Launchpad.

          This build is Developer ID signed but not notarized. On first install, macOS may warn that it cannot verify the app. If that happens:
          1. Control-click or right-click `Teale.app` and choose **Open**
          2. If needed, go to **System Settings > Privacy & Security** and click **Open Anyway**

          **Or one command:**
          ```
          curl -fsSL https://raw.githubusercontent.com/teale-ai/teale-mono/main/mac-app/scripts/install.sh | sh
          ```

          Requires macOS 14 Sonoma or later. Apple Silicon only.

          ## Backends

          Teale ships with four inference backends. Pick one in **Settings → Inference Engine**:

          - **Local MLX** (default) — in-process MLX via mlx-swift-lm
          - **llama.cpp** — subprocess that loads GGUF models
          - **Exo Gateway** — HTTP proxy to an external Exo cluster
          - **Rapid-MLX** *(new)* — fastest MLX engine on Apple Silicon (~25% faster TPS than llama.cpp on Qwen3.6-35B in our benches). Apache-2.0 OpenAI-compatible server. Install separately:

            ```
            brew install raullenchai/rapid-mlx/rapid-mlx
            ```

            Then in Teale Settings, switch the engine to **Rapid-MLX** and set the model alias (e.g. \`qwen3.6-35b\`). See [raullenchai/Rapid-MLX](https://github.com/raullenchai/Rapid-MLX) for the full alias list.
          EOF
          )" \
            .build/Teale.dmg \
            .build/Teale.zip \
            .build/teale-macos-arm64 \
            .build/checksums.txt
