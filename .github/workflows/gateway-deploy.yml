name: gateway-deploy

on:
  push:
    branches: [main]
    paths:
      - "gateway/**"
      - "protocol/**"
      - ".github/workflows/gateway-deploy.yml"

jobs:
  fly-deploy:
    runs-on: ubuntu-latest
    # Only auto-deploy from main. Manual dispatch for testing branches.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: deploy
        # Build context is the monorepo root so the Dockerfile's
        # `COPY Cargo.toml Cargo.lock ./`, `COPY protocol protocol`, etc.
        # can reach sibling crates. Use --config + --dockerfile to point
        # flyctl at the gateway's app config without changing cwd.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: >
          flyctl deploy --remote-only
          --config gateway/fly.toml
          --dockerfile gateway/Dockerfile
