name: mac-app

on:
  push:
    branches: [main]
    paths:
      - "mac-app/**"
      - ".github/workflows/mac-app.yml"
  pull_request:
    paths:
      - "mac-app/**"
      - ".github/workflows/mac-app.yml"

jobs:
  swift-build:
    # macos-14 ships Swift 5.10; mlx-swift-lm requires Swift ≥ 6.1 (macos-15).
    runs-on: macos-15
    defaults:
      run:
        working-directory: mac-app
    steps:
      - uses: actions/checkout@v5
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test
