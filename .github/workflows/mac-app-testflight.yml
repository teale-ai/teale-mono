name: TestFlight

on:
  workflow_dispatch:
  push:
    tags: ['ios-v*']

jobs:
  upload:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mac-app
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Import Apple Distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 -d > /tmp/ios-cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/ios-cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/ios-cert.p12

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/teale-companion.mobileprovision

      - name: Write App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          api_key_dir="$HOME/.appstoreconnect/private_keys"
          api_key_path="$api_key_dir/AuthKey_${API_KEY_ID}.p8"
          mkdir -p "$api_key_dir"
          printf '%s\n' "$API_KEY_P8" > "$api_key_path"
          chmod 600 "$api_key_path"

      - name: Archive, export, and upload to TestFlight
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          API_KEY_PATH: ${{ format('{0}/.appstoreconnect/private_keys/AuthKey_{1}.p8', github.workspace, secrets.APPSTORE_API_KEY_ID) }}
        run: ./scripts/upload-testflight.sh
