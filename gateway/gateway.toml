# teale-gateway config — deployed at gateway.teale.com.
#
# Secret bearer tokens are loaded from the GATEWAY_TOKENS env var at startup
# (format: "tok_abc:openrouter,tok_dev:internal"). Rotate via `fly secrets set`.

bind = "0.0.0.0:8080"
display_name = "teale-gateway"
identity_path = "/data/gateway-identity.key"
models_yaml = "/app/models.yaml"

[relay]
url = "wss://relay.teale.com/ws"

[scheduler]
max_queue_depth = 8
swap_penalty = 0.3
tps_weight = 1.0

[scheduler.per_model_floor]
# 2026-04-19: small=2 restored (meta-llama/llama-3.1-8b-instruct now
# served by 4 supply nodes). Large stays at 1 until ≥3 supply nodes
# carry a ≥50B model; raise to 3 then.
large = 1
small = 2

[reliability]
request_timeout_seconds = 300
# TTFT deadline covers relay-open + first-token latency. Small warm models
# are 300-500 ms end-to-end; the 60 s ceiling here accommodates cold loads
# on large MoE models (e.g., DeepSeek V3.2 on a 2-Ultra exo cluster boots
# in up to 57 s when nothing's been hot). Tighten back to 15 s once the
# large-model cluster has warm-keeping and the scheduler avoids sending
# first traffic to a fully-cold instance.
ttft_deadline_seconds = 60
max_retries = 1
# Teale's supply-side WAN stack has no direct node→relay heartbeat — it only
# re-registers every 240 s (WANDiscovery.startReregistration). 30 s here
# caused the gateway to flap devices into "stale" almost continuously,
# dropping eligibility for models that were in fact healthy and loaded.
# Bump to 300 s to span Teale's register cadence + slack. If we later add
# a proper node→relay heartbeat forwarded to gateway, restore to 30 s.
heartbeat_stale_seconds = 300
quarantine_seconds = 30
discover_interval_seconds = 10
