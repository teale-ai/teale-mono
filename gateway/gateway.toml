# teale-gateway config — deployed at gateway.teale.com.
#
# Secret bearer tokens are loaded from the GATEWAY_TOKENS env var at startup
# (format: "tok_abc:openrouter,tok_dev:internal"). Rotate via `fly secrets set`.

bind = "0.0.0.0:8080"
display_name = "teale-gateway"
identity_path = "/data/gateway-identity.key"
models_yaml = "/app/models.yaml"

[relay]
url = "wss://relay.teale.com/ws"

[scheduler]
max_queue_depth = 8
swap_penalty = 0.3
tps_weight = 1.0

[scheduler.per_model_floor]
# 2026-04-19: lowered small=1 to re-expose hermes-3-llama-3.1-8b (served only
# by tailor16, Nous Research's own fine-tune — worth keeping reachable via
# teale/auto for hermes-agent). Restore to small=2, large>=2 before opening
# real OpenRouter traffic — single-supplier models will reject under node
# quarantine or overload.
large = 1
small = 1

[reliability]
request_timeout_seconds = 300
# 15s covers transient relay-open spikes (occasional session-setup stalls
# were causing single-digit-percent stress failures at 10s); real TTFT
# under load is still 300-500 ms for small models.
ttft_deadline_seconds = 15
max_retries = 1
heartbeat_stale_seconds = 30
quarantine_seconds = 30
discover_interval_seconds = 10
