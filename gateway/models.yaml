    context_length: 16384
    max_output_tokens: 8192
    params_b: 8
    pricing_prompt: "0.00000010"   # $0.10 / M tokens input
    pricing_completion: "0.00000020" # $0.20 / M tokens output
    quantization: Q4_K_M
    supported_parameters: [temperature, top_p, max_tokens, stop, stream, seed, frequency_penalty, presence_penalty]
