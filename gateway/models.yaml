# Gateway model catalog — the 5–8 open-weight models we advertise to OpenRouter.
# Sourced from docs/device-model-matrix.md top picks. Pricing is
# placeholder USD per 1M tokens; update before submitting to OR.
#
# max_output_tokens is the hard ceiling we accept for `max_tokens` on each
# model — OpenRouter's /models schema requires this, separate from
# context_length (which is prompt+completion combined).

models:
