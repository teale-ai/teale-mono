<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>teale.com — models catalog</title>
  <meta name="description" content="Live catalog of open-weight models served by the Teale distributed inference network. Realtime TTFT and TPS from actual traffic.">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <style>
    :root {
      --bg: #000000;
      --card: #0A0F11;
      --text: #009999;
      --bright: #33B3B3;
      --dim: #007272;
      --fail: #ff4d4d;
      --warn: #ffcc33;
      --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body { padding: 32px 20px 48px; display: flex; justify-content: center; }
    main { width: 100%; max-width: 860px; }
    a { color: var(--bright); text-decoration: none; border-bottom: 1px dashed var(--dim); }
    a:hover { color: var(--text); }
    header.title {
      display: flex; align-items: baseline; gap: 10px;
      color: var(--bright); letter-spacing: 0.04em;
      font-weight: 500; text-transform: lowercase; flex-wrap: wrap;
    }
    header.title .host { color: var(--bright); }
    header.title .sep { color: var(--dim); padding: 0 4px; }
    header.title .tagline { color: var(--text); }
    header.title .cursor {
      display: inline-block; width: 8px; height: 14px;
      background: var(--text); margin-left: 4px; vertical-align: -1px;
      animation: blink 1.1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    hr.rule { border: 0; border-top: 1px dashed var(--dim); margin: 14px 0 20px; }
    .prompt { color: var(--dim); margin: 18px 0 6px; }
    .prompt .arrow { color: var(--text); }
    .prompt .val { color: var(--bright); }
    .banner { padding: 10px 14px; border: 1px solid var(--warn); color: var(--warn); margin-bottom: 18px; display: none; }
    .banner.fail { border-color: var(--fail); color: var(--fail); }

    .catalog { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 6px 0 18px; }
    .model {
      background: var(--card); border: 1px solid var(--dim);
      padding: 14px 18px; display: grid;
      grid-template-columns: 1fr max-content; gap: 8px 20px;
      align-items: baseline;
    }
    .model .id { color: var(--bright); font-weight: 500; }
    .model .id::before { content: "[ "; color: var(--dim); }
    .model .id::after  { content: " ]"; color: var(--dim); }
    .model .tier {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--dim); text-align: right; white-space: nowrap;
    }
    .model .desc {
      grid-column: 1 / -1; color: var(--text); margin-top: 2px;
    }
    .model dl.stats {
      grid-column: 1 / -1; margin: 8px 0 0;
      display: grid; grid-template-columns: max-content 1fr;
      row-gap: 4px; column-gap: 18px; align-items: baseline;
    }
    .model dl.stats dt {
      color: var(--dim); text-transform: uppercase;
      letter-spacing: 0.06em; font-size: 11px;
    }
    .model dl.stats dd {
      margin: 0; color: var(--bright); font-variant-numeric: tabular-nums;
    }
    .model dl.stats dd.metrics {
      display: flex; gap: 18px; flex-wrap: wrap;
    }
    .model dl.stats dd .lbl { color: var(--dim); }
    .model dl.stats dd .v { color: var(--bright); }
    .model dl.stats dd small { color: var(--dim); margin-left: 6px; }
    .model.offline { opacity: 0.55; }
    .model.offline .id { color: var(--dim); }

    .summary {
      display: grid;
      grid-template-columns: max-content 1fr;
      row-gap: 4px; column-gap: 18px;
      margin-bottom: 12px; align-items: baseline;
    }
    .summary dt { color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; }
    .summary dd { margin: 0; color: var(--bright); font-variant-numeric: tabular-nums; }
    .summary dd small { color: var(--dim); margin-left: 6px; }

    pre.curl {
      margin: 0; padding: 14px 16px;
      background: var(--card); border: 1px solid var(--dim);
      color: var(--bright); overflow-x: auto; white-space: pre;
      font-family: var(--mono); font-size: 13px;
    }
    pre.curl .c { color: var(--dim); }
    footer { margin-top: 36px; color: var(--dim); font-size: 13px; display: grid; gap: 4px; }

    @media (max-width: 540px) {
      body { padding: 20px 14px 36px; }
      .model { grid-template-columns: 1fr; }
      .model .tier { text-align: left; }
      .model dl.stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main>
  <header class="title">
    <a class="host" href="https://teale.com">teale.com</a><span class="sep">|</span><span class="tagline">models catalog</span><span class="cursor" aria-hidden="true"></span>
  </header>
  <hr class="rule">

  <div class="banner" id="banner" role="status"></div>

  <div class="prompt"><span class="arrow">&gt;</span> gateway: <span class="val">gateway.teale.com</span></div>
  <dl class="summary">
    <dt>Models</dt><dd id="modelCount">—</dd>
    <dt>Advertising</dt><dd id="readyCount">— <small>(models with live supply)</small></dd>
  </dl>

  <div class="prompt"><span class="arrow">&gt;</span> available models</div>
  <div class="catalog" id="catalog" role="list"></div>

  <div class="prompt"><span class="arrow">&gt;</span> use any model via OpenAI-compatible API</div>
  <pre class="curl" id="curl"></pre>

  <footer>
    <div class="tagline">distributed ai inference is the future.</div>
    <div>join the network &rarr; <a href="https://teale.com">teale.com</a></div>
    <div>follow &rarr; <a href="https://x.com/teale_ai" target="_blank" rel="noopener noreferrer">@teale_ai</a></div>
  </footer>
</main>

<script>
(function () {
  "use strict";
  const CRED_PER_USD = 1_000_000;

  function fmtPrice(credPerToken) {
    // pricing fields are strings of USD per token, e.g. "0.00000025"
    const perMil = Number(credPerToken) * 1_000_000;
    if (!isFinite(perMil)) return "—";
    return "$" + perMil.toFixed(2);
  }
  function fmtParams(p) {
    if (p == null) return "—";
    if (p >= 1) return p.toFixed(0) + "B";
    return (p * 1000).toFixed(1) + "M";
  }
  function fmtCtx(n) {
    if (!n) return "—";
    if (n >= 1024) return Math.round(n / 1024) + "K";
    return String(n);
  }
  function fmtAgeSecs(s) {
    if (s == null) return "";
    if (s < 60) return s + "s ago";
    if (s < 3600) return Math.round(s / 60) + "m ago";
    return Math.round(s / 3600) + "h ago";
  }
  function banner(msg, fail) {
    const b = document.getElementById("banner");
    b.textContent = msg;
    b.className = "banner" + (fail ? " fail" : "");
    b.style.display = "block";
  }

  function render(data) {
    const catalog = document.getElementById("catalog");
    const models = data.data || [];
    document.getElementById("modelCount").textContent = String(models.length);
    const ready = models.filter(m => m.metrics && m.metrics.sample_count > 0).length;
    document.getElementById("readyCount").innerHTML = String(ready) +
      ' <small>(models with live supply)</small>';

    catalog.innerHTML = "";
    models.forEach(m => {
      const el = document.createElement("div");
      el.className = "model" + (m.metrics ? "" : " offline");
      el.setAttribute("role", "listitem");

      const id = document.createElement("div");
      id.className = "id";
      id.textContent = m.id;

      const tier = document.createElement("div");
      tier.className = "tier";
      tier.textContent = [m.owned_by, m.quantization || ""].filter(Boolean).join(" · ");

      const desc = document.createElement("div");
      desc.className = "desc";
      desc.textContent = m.description || "";

      const stats = document.createElement("dl");
      stats.className = "stats";

      function row(label, valueNode) {
        const dt = document.createElement("dt");
        dt.textContent = label;
        const dd = document.createElement("dd");
        if (typeof valueNode === "string") dd.textContent = valueNode;
        else dd.appendChild(valueNode);
        stats.appendChild(dt);
        stats.appendChild(dd);
        return dd;
      }

      row("context", fmtCtx(m.context_length));

      if (m.pricing) {
        row("pricing",
          `${fmtPrice(m.pricing.prompt)} / ${fmtPrice(m.pricing.completion)} per 1M tokens`);
      }

      if (m.metrics && m.metrics.sample_count > 0) {
        const wrap = document.createElement("div");
        wrap.className = "metrics";
        wrap.style.display = "flex";
        wrap.style.gap = "18px";
        wrap.style.flexWrap = "wrap";

        const ttft = document.createElement("span");
        ttft.innerHTML = `<span class="lbl">ttft</span> <span class="v">${m.metrics.ttft_ms_p50 ?? "—"}ms</span> <small>p50 · ${m.metrics.ttft_ms_p95 ?? "—"}ms p95</small>`;
        const tps = document.createElement("span");
        tps.innerHTML = `<span class="lbl">tps</span> <span class="v">${(m.metrics.tps_p50 ?? 0).toFixed(1)}</span> <small>p50 · ${(m.metrics.tps_p95 ?? 0).toFixed(1)} p95</small>`;
        const src = document.createElement("span");
        src.innerHTML = `<small>${m.metrics.sample_count} samples · ${fmtAgeSecs(m.metrics.last_sample_age_seconds)}</small>`;

        wrap.appendChild(ttft);
        wrap.appendChild(tps);
        wrap.appendChild(src);
        const dd = row("live", wrap);
        dd.classList.add("metrics");
      } else {
        row("live", "no recent samples in window");
      }

      el.appendChild(id);
      el.appendChild(tier);
      el.appendChild(desc);
      el.appendChild(stats);
      catalog.appendChild(el);
    });

    const sample = models.find(m => m.metrics && m.metrics.sample_count > 0) || models[0];
    const curl = document.getElementById("curl");
    const id = sample ? sample.id : "<model-id>";
    curl.innerHTML =
      `curl <span class="c">\\</span>\n` +
      `  https://gateway.teale.com/v1/chat/completions <span class="c">\\</span>\n` +
      `  -H <span class="c">"Authorization: Bearer &lt;your-token&gt;"</span> <span class="c">\\</span>\n` +
      `  -H <span class="c">"Content-Type: application/json"</span> <span class="c">\\</span>\n` +
      `  -d <span class="c">'{"model":"${id}","stream":true,"messages":[{"role":"user","content":"hi"}]}'</span>`;
  }

  async function load() {
    try {
      const res = await fetch("/v1/models", { headers: { "Accept": "application/json" } });
      if (!res.ok) {
        banner("gateway returned " + res.status, true);
        return;
      }
      render(await res.json());
    } catch (err) {
      banner("failed to load /v1/models: " + (err && err.message ? err.message : String(err)), true);
    }
  }

  load();
  setInterval(load, 30_000);
})();
</script>
</body>
</html>
